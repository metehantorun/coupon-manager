name: Coupon Manager CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.2
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          AWS_DEFAULT_REGION: us-east-1

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Wait for LocalStack
      run: |
        echo "LocalStack'in hazır olması bekleniyor..."
        for i in {1..10}; do
          curl -s http://localhost:4566/_localstack/health && break
          echo "Bekleniyor..."
          sleep 2
        done

    - name: Run Pytest with Coverage and E2E
      env:
        AWS_ACCESS_KEY_ID: test
        AWS_SECRET_ACCESS_KEY: test
        AWS_DEFAULT_REGION: us-east-1
        # Uygulamanın LocalStack'e bağlanacağı adres
        S3_ENDPOINT_URL: http://localhost:4566
      run: |
        pytest --cov=src tests/ --cov-fail-under=70

    - name: Install Playwright Browsers
      run: |
        python -m playwright install --with-deps chromium

    - name: Install Node.js for Newman and k6
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Newman
      run: npm install -g newman

    - name: Run Background Application for Integration Tests
      env:
        AWS_ACCESS_KEY_ID: test
        AWS_SECRET_ACCESS_KEY: test
        AWS_DEFAULT_REGION: us-east-1
        S3_ENDPOINT_URL: http://localhost:4566
      run: |
        uvicorn src.main:app --host 0.0.0.0 --port 8000 &
        sleep 5

    - name: Run Postman Collection via Newman
      run: |
        newman run postman/collection.json

    - name: Setup k6
      uses: grafana/setup-k6-action@v1

    - name: Run Performance Test via k6
      run: |
        k6 run perf/load-test.js

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: coupon-manager-web:latest